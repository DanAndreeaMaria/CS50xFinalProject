<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />
    <!-- Bootstrap 5.3.3 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Coiny&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />

    <!-- Bootstrap 5.3.3 JS (Bundle includes Popper) -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>

    <title>{% block title %}Nutrient Tracker{% endblock %}</title>
  </head>
  <body class="d-flex flex-column min-vh-100">
    <!-- Navbar with the title of the app -->
    <nav class="navbar bg-dark px-3">
      <a class="navbar-brand" href="#">
        <h1 class="text-light">
          <i class="bi bi-patch-check text-success me-1"></i> Nutrient Tracker
        </h1>
      </a>

      <!-- Buttons - 'Create account' & 'Log Out' & 'Log In' -->
      <div class="ms-auto d-flex align-items-center">
        {% if session["username"] %}
        <span class="text-light me-3">Welcome, {{ session["username"] }}!</span>

        <a class="btn btn-outline-light me-2" href="/logout">
          <i class="bi bi-box-arrow-right me-1"></i>Log Out
        </a>
        {% else %}
        <a class="btn btn-success" href="/register">
          <i class="bi bi-person-plus-fill me-1"></i> Create Account
        </a>

        <!-- Vertical spacing -->
        <div style="margin: 0 8px"></div>

        <!-- Login button -->
        <a class="btn btn-outline-success me-2" href="/login">
          <i class="bi bi-box-arrow-in-right me-1"></i> Log In
        </a>
        {% endif %}
      </div>
    </nav>

    <!-- Description -->
    {% block main %}{% endblock %}

    <!-- Footer -->
    <footer class="py-3 my-4 mt-auto">
      <ul class="nav justify-content-center border-bottom pb-3 mb-3"></ul>
      <p class="text-center text-body-secondary">Made with 💚 by Andreea</p>
    </footer>
  </body>
</html>
